services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oxrm}
      POSTGRES_USER: ${POSTGRES_USER:-oxrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oxrm}
    ports:
      - "127.0.0.1:${HOST_POSTGRES_PORT:-18183}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    ports:
      - "127.0.0.1:${HOST_REDIS_PORT:-18184}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/node.Dockerfile
    command: scripts/oxrm-internal run api
    environment:
      NODE_ENV: development
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OXRM_BACKUP_REQUIRED: ${OXRM_BACKUP_REQUIRED:-false}
      OXRM_DEPLOY_TARGET: ${OXRM_DEPLOY_TARGET:-local}
      OXRM_DEPLOY_VERSION: ${OXRM_DEPLOY_VERSION:-0.2.1}
      OXRM_DEPLOY_GIT_SHA: ${OXRM_DEPLOY_GIT_SHA:-}
      OXRM_DEPLOY_GIT_REF: ${OXRM_DEPLOY_GIT_REF:-}
      OXRM_DEPLOY_GITHUB_RUN_ID: ${OXRM_DEPLOY_GITHUB_RUN_ID:-}
      OXRM_DEPLOY_GITHUB_RUN_NUMBER: ${OXRM_DEPLOY_GITHUB_RUN_NUMBER:-}
      OXRM_DEPLOYED_AT: ${OXRM_DEPLOYED_AT:-}
      OXRM_WORKSPACE_MODE: ${OXRM_WORKSPACE_MODE:-job_search}
      OXRM_DEMO_MODE: ${OXRM_DEMO_MODE:-false}
      OXRM_DEMO_GUIDE_VERSION: ${OXRM_DEMO_GUIDE_VERSION:-1}
      DATABASE_URL: postgres://${POSTGRES_USER:-oxrm}:${POSTGRES_PASSWORD:-oxrm}@postgres:5432/${POSTGRES_DB:-oxrm}
      REDIS_URL: redis://redis:6379
      API_HOST: 0.0.0.0
      API_PORT: 18181
    ports:
      - "127.0.0.1:${HOST_API_PORT:-18181}:18181"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  mcp:
    build:
      context: .
      dockerfile: infra/docker/node.Dockerfile
    command: scripts/oxrm-internal run mcp
    environment:
      NODE_ENV: development
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OXRM_BACKUP_REQUIRED: ${OXRM_BACKUP_REQUIRED:-false}
      OXRM_DEPLOY_TARGET: ${OXRM_DEPLOY_TARGET:-local}
      OXRM_DEPLOY_VERSION: ${OXRM_DEPLOY_VERSION:-0.2.1}
      OXRM_DEPLOY_GIT_SHA: ${OXRM_DEPLOY_GIT_SHA:-}
      OXRM_DEPLOY_GIT_REF: ${OXRM_DEPLOY_GIT_REF:-}
      OXRM_DEPLOY_GITHUB_RUN_ID: ${OXRM_DEPLOY_GITHUB_RUN_ID:-}
      OXRM_DEPLOY_GITHUB_RUN_NUMBER: ${OXRM_DEPLOY_GITHUB_RUN_NUMBER:-}
      OXRM_DEPLOYED_AT: ${OXRM_DEPLOYED_AT:-}
      DATABASE_URL: postgres://${POSTGRES_USER:-oxrm}:${POSTGRES_PASSWORD:-oxrm}@postgres:5432/${POSTGRES_DB:-oxrm}
      REDIS_URL: redis://redis:6379
      MCP_HOST: 0.0.0.0
      MCP_PORT: 18182
    ports:
      - "127.0.0.1:${HOST_MCP_PORT:-18182}:18182"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infra/docker/node.Dockerfile
    command: pnpm --filter @oxrm/web start:container
    environment:
      NODE_ENV: development
      WEB_PORT: 18180
      OXRM_API_PROXY_TARGET: http://api:18181
      CRM_API_PROXY_TARGET: http://api:18181
    ports:
      - "127.0.0.1:${HOST_WEB_PORT:-18180}:18180"
    depends_on:
      - api
      - mcp

  worker:
    build:
      context: .
      dockerfile: infra/docker/node.Dockerfile
    command: scripts/oxrm-internal run worker
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-oxrm}:${POSTGRES_PASSWORD:-oxrm}@postgres:5432/${POSTGRES_DB:-oxrm}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: infra/docker/node.Dockerfile
    command: scripts/oxrm-internal run scheduler
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-oxrm}:${POSTGRES_PASSWORD:-oxrm}@postgres:5432/${POSTGRES_DB:-oxrm}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backup:
    build:
      context: .
      dockerfile: infra/docker/node.Dockerfile
    command: pnpm --filter @oxrm/backup dev
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-oxrm}:${POSTGRES_PASSWORD:-oxrm}@postgres:5432/${POSTGRES_DB:-oxrm}
      BACKUP_GITHUB_REPO: ${BACKUP_GITHUB_REPO:-local/dev-backups}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
