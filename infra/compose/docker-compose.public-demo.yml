services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${HOST_POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infra/docker/node.Dockerfile
    restart: unless-stopped
    command: scripts/oxrm-internal run api
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OXRM_BACKUP_REQUIRED: "false"
      OXRM_DEPLOY_TARGET: ${OXRM_DEPLOY_TARGET:-local}
      OXRM_DEPLOY_VERSION: ${OXRM_DEPLOY_VERSION:-0.2.1}
      OXRM_DEPLOY_GIT_SHA: ${OXRM_DEPLOY_GIT_SHA:-}
      OXRM_DEPLOY_GIT_REF: ${OXRM_DEPLOY_GIT_REF:-}
      OXRM_DEPLOY_GITHUB_RUN_ID: ${OXRM_DEPLOY_GITHUB_RUN_ID:-}
      OXRM_DEPLOY_GITHUB_RUN_NUMBER: ${OXRM_DEPLOY_GITHUB_RUN_NUMBER:-}
      OXRM_DEPLOYED_AT: ${OXRM_DEPLOYED_AT:-}
      OXRM_WORKSPACE_MODE: ${OXRM_WORKSPACE_MODE:-job_search}
      OXRM_DEMO_MODE: ${OXRM_DEMO_MODE:-true}
      OXRM_DEMO_GUIDE_VERSION: ${OXRM_DEMO_GUIDE_VERSION:-1}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      API_HOST: 0.0.0.0
      API_PORT: 18181
    ports:
      - "127.0.0.1:${HOST_API_PORT}:18181"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
