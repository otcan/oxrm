name: Bug
description: Report a reproducible oXRM bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the behavior and where you saw it.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include exact commands, URLs, and sanitized output.
      placeholder: |
        1. ./oxrm start
        2. ./oxrm ready
        3. ./oxrm demo
        4. ./oxrm test
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, Compose version if installed, and oXRM commit.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Do not include tokens, cookies, real leads, real emails, private hosts, dumps, or backups.
