name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22.22.3"
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Check migration generation
        run: |
          pnpm db:generate
          git diff --exit-code packages/db/src/migrations

      - name: Validate Compose
        run: docker compose -f docker-compose.yml -f infra/compose/docker-compose.prod.yml config
