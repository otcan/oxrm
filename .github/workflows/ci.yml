name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22.22.3"
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Check shell scripts
        run: bash -n oxrm ocrm scripts/oxrm-instance scripts/oxrm-internal scripts/codex-demo.sh scripts/deploy-live-demo scripts/smoke-user-journey.sh scripts/smoke-runtime-repair.sh scripts/smoke-job-search-setup.sh scripts/smoke-job-search-actions.sh scripts/check-workspace-mode-ui.sh

      - name: Launch naming and docs guard
        run: |
          test ! -e crm
          test -x oxrm
          test -x ocrm
          test -x scripts/oxrm-instance
          test -x scripts/oxrm-internal
          test -f docs/migrations/v0.2-to-v0.3.md
          test -f .codex/config.toml
          test -f AGENTS.md
          test -f docs/assets/oxrm-dashboard.png
          test -f docs/start-here.md
          test -f docs/xrm-model.md
          test -f docs/onboarding/job-search-setup.md
          test -f docs/onboarding/outreach-setup.md
          test -f docs/agent-job-search-loop.md
          test -f docs/live-demos.md
          test "$(wc -l < README.md)" -le 200
          git grep -n -F -- "oxrm://setup/job-search" docs/start-here.md docs/onboarding/job-search-setup.md docs/agent-job-search-loop.md docs/mcp.md
          git grep -n -F -- "./oxrm cli setup:job-search" README.md docs/start-here.md docs/onboarding.md docs/onboarding/job-search-setup.md
          ! git grep -n -E -- "otcan/orkestr-crm|@orkestr-crm|scripts/crm|orkestr-crm|orkestr_crm|ORKESTR_HOST|ORKESTR_ADMIN|backups@orkestr" -- . \
            ":(exclude)node_modules/**" \
            ":(exclude)apps/web/dist/**" \
            ":(exclude)dist/**" \
            ":(exclude).env.example" \
            ":(exclude).github/workflows/ci.yml" \
            ":(exclude)docs/migrations/v0.2-to-v0.3.md" \
            ":(exclude)ocrm"

      - name: Workspace mode UI guard
        run: bash scripts/check-workspace-mode-ui.sh

      - name: Runtime repair smoke
        run: bash scripts/smoke-runtime-repair.sh

      - name: Check built package exports
        run: |
          pnpm --filter @oxrm/api exec node --input-type=module -e "await import('@oxrm/shared'); await import('@oxrm/db'); await import('@oxrm/core');"

      - name: Check migration generation
        run: |
          pnpm db:generate
          git diff --exit-code packages/db/src/migrations

      - name: Validate Compose
        run: docker compose -f docker-compose.yml -f infra/compose/docker-compose.prod.yml config

      - name: Validate public demo Compose
        run: |
          POSTGRES_DB=oxrm_ci \
          POSTGRES_USER=oxrm_ci \
          POSTGRES_PASSWORD=ci-password \
          HOST_API_PORT=18311 \
          HOST_POSTGRES_PORT=18313 \
          docker compose -f infra/compose/docker-compose.public-demo.yml config

  docker-demo:
    needs: static
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22.22.3"
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prepare demo env
        run: cp instances/demo.env.example instances/demo.local.env

      - name: Start and seed Codex demo stack
        run: ./oxrm codex-demo --check

      - name: HTTP smoke
        run: |
          curl -fsS http://127.0.0.1:18291/api/health
          curl -fsS http://127.0.0.1:18291/api/views
          curl -fsSI http://127.0.0.1:18290/

      - name: MCP smoke
        run: |
          ./oxrm cli health
          ./oxrm tools
          ./oxrm cli mcp:read crm://queue/today

      - name: Job search setup smoke
        run: bash scripts/smoke-job-search-setup.sh

      - name: Job search action queue smoke
        run: bash scripts/smoke-job-search-actions.sh

      - name: Demo reset seed smoke
        run: |
          ./oxrm seed none --reset-demo
          ./oxrm cli testing:synthetic

      - name: Fresh non-demo user journey smoke
        run: bash scripts/smoke-user-journey.sh

      - name: Stop demo stack
        if: always()
        run: ./oxrm stop || true

  proxy-smoke:
    needs: static
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Caddy config
        run: |
          docker run --rm \
            -v "$PWD/infra/proxy/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2 sh -lc 'HASH="$(caddy hash-password --plaintext ci-password)" && OXRM_HOST=:8080 OXRM_ADMIN_USER=ci OXRM_ADMIN_PASSWORD_HASH="$HASH" caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile'

      - name: Validate demo Caddy config
        run: |
          docker run --rm \
            -v "$PWD/infra/proxy/Caddyfile.demos:/etc/caddy/Caddyfile:ro" \
            caddy:2 sh -lc 'HASH="$(caddy hash-password --plaintext ci-password)" && OXRM_DEMO_ADMIN_USER=ci OXRM_DEMO_ADMIN_PASSWORD_HASH="$HASH" JOB_SEARCH_DEMO_API_PORT=18311 LINKEDIN_OUTREACH_DEMO_API_PORT=18321 caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile'

  deploy-live-demos:
    needs:
      - static
      - docker-demo
      - proxy-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: live-demos

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure SSH
        env:
          OXRM_DEMO_SSH_HOST: ${{ secrets.OXRM_DEMO_SSH_HOST }}
          OXRM_DEMO_SSH_PORT: ${{ secrets.OXRM_DEMO_SSH_PORT }}
          OXRM_DEMO_SSH_PRIVATE_KEY: ${{ secrets.OXRM_DEMO_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$OXRM_DEMO_SSH_PRIVATE_KEY" > ~/.ssh/oxrm-demo
          chmod 600 ~/.ssh/oxrm-demo
          ssh-keyscan -p "${OXRM_DEMO_SSH_PORT:-22}" "$OXRM_DEMO_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Copy checkout to demo host
        env:
          OXRM_DEMO_SSH_HOST: ${{ secrets.OXRM_DEMO_SSH_HOST }}
          OXRM_DEMO_SSH_USER: ${{ secrets.OXRM_DEMO_SSH_USER }}
          OXRM_DEMO_SSH_PORT: ${{ secrets.OXRM_DEMO_SSH_PORT }}
          OXRM_DEMO_DEPLOY_ROOT: ${{ secrets.OXRM_DEMO_DEPLOY_ROOT }}
        run: |
          port="${OXRM_DEMO_SSH_PORT:-22}"
          remote="${OXRM_DEMO_SSH_USER}@${OXRM_DEMO_SSH_HOST}"
          release_dir="${OXRM_DEMO_DEPLOY_ROOT}/releases/${GITHUB_SHA}"
          ssh_opts=(-i ~/.ssh/oxrm-demo -p "$port" -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes)
          ssh "${ssh_opts[@]}" "$remote" "rm -rf '$release_dir' && mkdir -p '$release_dir'"
          tar --exclude=.git --exclude=node_modules --exclude=.pnpm-store -czf - . \
            | ssh "${ssh_opts[@]}" "$remote" "tar -xzf - -C '$release_dir' && ln -sfn '$release_dir' '${OXRM_DEMO_DEPLOY_ROOT}/current'"

      - name: Deploy live demos
        env:
          OXRM_DEMO_SSH_HOST: ${{ secrets.OXRM_DEMO_SSH_HOST }}
          OXRM_DEMO_SSH_USER: ${{ secrets.OXRM_DEMO_SSH_USER }}
          OXRM_DEMO_SSH_PORT: ${{ secrets.OXRM_DEMO_SSH_PORT }}
          OXRM_DEMO_DEPLOY_ROOT: ${{ secrets.OXRM_DEMO_DEPLOY_ROOT }}
          OXRM_DEMO_POSTGRES_PASSWORD: ${{ secrets.OXRM_DEMO_POSTGRES_PASSWORD }}
          OXRM_DEMO_ADMIN_USER: ${{ secrets.OXRM_DEMO_ADMIN_USER }}
          OXRM_DEMO_ADMIN_PASSWORD_HASH: ${{ secrets.OXRM_DEMO_ADMIN_PASSWORD_HASH }}
        run: |
          port="${OXRM_DEMO_SSH_PORT:-22}"
          remote="${OXRM_DEMO_SSH_USER}@${OXRM_DEMO_SSH_HOST}"
          deployed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ssh_opts=(-i ~/.ssh/oxrm-demo -p "$port" -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes)
          ssh "${ssh_opts[@]}" "$remote" "bash -se" <<REMOTE
          set -euo pipefail
          cd '${OXRM_DEMO_DEPLOY_ROOT}/current'
          corepack enable
          pnpm install --frozen-lockfile
          export OXRM_DEMO_POSTGRES_PASSWORD='${OXRM_DEMO_POSTGRES_PASSWORD}'
          export OXRM_DEPLOY_VERSION='${GITHUB_RUN_NUMBER}.${GITHUB_SHA}'
          export OXRM_DEPLOY_GIT_SHA='${GITHUB_SHA}'
          export OXRM_DEPLOY_GIT_REF='${GITHUB_REF_NAME}'
          export OXRM_DEPLOY_GITHUB_RUN_ID='${GITHUB_RUN_ID}'
          export OXRM_DEPLOY_GITHUB_RUN_NUMBER='${GITHUB_RUN_NUMBER}'
          export OXRM_DEPLOYED_AT='${deployed_at}'
          scripts/deploy-live-demo job-search-demo job-search-demo.oxrm.orkestr.de job_search 18510 18511 18512 18513 18514 </dev/null
          scripts/deploy-live-demo linkedin-outreach-demo linkedin-outreach-demo.oxrm.orkestr.de outreach 18520 18521 18522 18523 18524 </dev/null
          node <<'NODE'
          const fs = require("node:fs");

          const expectedVersion = process.env.OXRM_DEPLOY_VERSION;
          const manifests = [
            [".deployments/job-search-demo.json", "job-search-demo", "job-search"],
            [".deployments/linkedin-outreach-demo.json", "linkedin-outreach-demo", "linkedin-outreach"]
          ];

          const failures = [];
          for (const [path, instance, scenario] of manifests) {
            if (!fs.existsSync(path)) {
              failures.push({ path, error: "missing_manifest" });
              continue;
            }
            const manifest = JSON.parse(fs.readFileSync(path, "utf8"));
            if (manifest.instance !== instance) failures.push({ path, error: "instance_mismatch", actual: manifest.instance });
            if (manifest.demoScenario !== scenario) failures.push({ path, error: "scenario_mismatch", actual: manifest.demoScenario });
            if (manifest.deployVersion !== expectedVersion) failures.push({ path, error: "version_mismatch", actual: manifest.deployVersion, expected: expectedVersion });
          }

          if (failures.length > 0) {
            console.error(JSON.stringify({ error: "live_demo_manifest_check_failed", failures }, null, 2));
            process.exit(1);
          }
          NODE
          OXRM_DEMO_ADMIN_USER='unused' \
          OXRM_DEMO_ADMIN_PASSWORD_HASH='unused' \
          JOB_SEARCH_DEMO_API_PORT=18511 \
          LINKEDIN_OUTREACH_DEMO_API_PORT=18521 \
            docker compose -p oxrm-demo-proxy -f infra/compose/docker-compose.demo-proxy.yml down --remove-orphans || true

          web_root='${OXRM_DEMO_DEPLOY_ROOT}/current/apps/web/dist/web/browser'
          if [ ! -f "\${web_root}/index.html" ]; then
            echo "Missing built web index at \${web_root}/index.html" >&2
            exit 1
          fi

          if [ -e /srv/oxrm-web ] && [ ! -L /srv/oxrm-web ]; then
            mv /srv/oxrm-web "/srv/oxrm-web.previous.\$(date -u +%Y%m%dT%H%M%SZ)"
          fi
          ln -sfn "\${web_root}" /srv/oxrm-web

          if command -v caddy >/dev/null 2>&1 && [ -f /etc/caddy/Caddyfile ]; then
            caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
            if [ "\${OXRM_DEMO_RELOAD_CADDY:-false}" = "true" ]; then
              echo "Reloading Caddy because OXRM_DEMO_RELOAD_CADDY=true..."
              timeout 30s caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile \
                || echo "Caddy reload did not complete; continuing to public bundle checks." >&2
            else
              echo "Skipping Caddy reload; live demo deploy updates the web symlink and stable API ports."
            fi
          fi

          expected_main="\$(sed -n 's/.*src=\"\\(main-[^\"]*\\.js\\)\".*/\\1/p' "\${web_root}/index.html" | head -n 1)"
          if [ -z "\${expected_main}" ]; then
            echo "Could not read built main asset from \${web_root}/index.html" >&2
            exit 1
          fi

          public_curl() {
            url="\$1"
            curl --http1.1 --connect-timeout 5 --max-time 20 --retry 2 --retry-delay 2 --retry-connrefused --retry-all-errors \
              -fsS -H 'Cache-Control: no-cache' "\${url}" || true
          }

          wait_for_public_bundle() {
            url="\$1"
            label="\$2"
            for attempt in \$(seq 1 10); do
              echo "Checking public web bundle for \${label}, attempt \${attempt}..."
              bundle_response=""
              if bundle_response="\$(public_curl "\${url}")"; then
                if grep -F "\${expected_main}" <<<"\${bundle_response}" >/dev/null; then
                  return 0
                fi
              fi
              if [ "\${attempt}" = "10" ]; then
                echo "Public web bundle for \${label} did not match \${expected_main}" >&2
                return 1
              fi
              sleep 2
            done
          }

          for host in job-search-demo.oxrm.orkestr.de linkedin-outreach-demo.oxrm.orkestr.de; do
            wait_for_public_bundle "https://\${host}/today?deploy=\${OXRM_DEPLOY_GIT_SHA}" "\${host}"
          done

          assert_bundle_text() {
            needle="\$1"
            if ! grep -R -F "\${needle}" "\${web_root}"/*.js >/dev/null; then
              echo "Built web bundle is missing expected text: \${needle}" >&2
              exit 1
            fi
          }

          assert_bundle_text_absent() {
            needle="\$1"
            if grep -R -F "\${needle}" "\${web_root}"/*.js >/dev/null; then
              echo "Built web bundle still contains forbidden text: \${needle}" >&2
              exit 1
            fi
          }

          assert_bundle_text "Run locally with an assistant"
          assert_bundle_text "Codex, Claude, Gemini, Cursor, VS Code, or another MCP-capable assistant"
          assert_bundle_text "assistant-ready job-search workspace"
          assert_bundle_text "assistant-ready outreach workspace"
          assert_bundle_text_absent "Codex setup"
          assert_bundle_text_absent "./oxrm codex-demo"
          assert_bundle_text_absent "private AI job-search copilot"
          assert_bundle_text_absent "private AI outreach copilot"

          check_demo_mode() {
            host="\$1"
            expected_mode="\$2"
            page_path="\$3"

            bootstrap="\$(public_curl "https://\${host}/api/workspace/bootstrap?deploy=\${OXRM_DEPLOY_GIT_SHA}")"
            node -e '
              const data = JSON.parse(process.argv[1]);
              const expected = process.argv[2];
              if (data.mode !== expected || data.templateKey !== expected) {
                console.error(JSON.stringify({ error: "workspace_mode_mismatch", data, expected }, null, 2));
                process.exit(1);
              }
              if (!data.demo?.enabled || data.demo.guideVersion !== 1 || !data.demo.readOnly || !data.demo.resettable) {
                console.error(JSON.stringify({ error: "demo_config_mismatch", data }, null, 2));
                process.exit(1);
              }
            ' "\${bootstrap}" "\${expected_mode}"

            for route in "\${page_path}" "/today"; do
              wait_for_public_bundle "https://\${host}\${route}?deploy=\${OXRM_DEPLOY_GIT_SHA}" "\${host}\${route}"
            done

            if [ "\${expected_mode}" = "job_search" ]; then
              wait_for_public_bundle "https://\${host}/setup/job-search?deploy=\${OXRM_DEPLOY_GIT_SHA}" "\${host}/setup/job-search"

              apps="\$(public_curl "https://\${host}/api/views/job_search.applications/run?limit=100&deploy=\${OXRM_DEPLOY_GIT_SHA}")"
              leads="\$(public_curl "https://\${host}/api/leads?limit=100&deploy=\${OXRM_DEPLOY_GIT_SHA}")"
              setup="\$(public_curl "https://\${host}/api/setup/job-search?deploy=\${OXRM_DEPLOY_GIT_SHA}")"
              node -e '
                const apps = JSON.parse(process.argv[1]);
                const leads = JSON.parse(process.argv[2]);
                const setup = JSON.parse(process.argv[3]);
                const appCount = Array.isArray(apps.rows) ? apps.rows.length : 0;
                const leadCount = Array.isArray(leads) ? leads.length : 0;
                if (appCount < 1 || leadCount !== 0) {
                  console.error(JSON.stringify({ error: "job_search_public_data_mismatch", appCount, leadCount }, null, 2));
                  process.exit(1);
                }
                if (!setup.configured || !Array.isArray(setup.sources) || setup.sources.length < 1) {
                  console.error(JSON.stringify({ error: "job_search_setup_mismatch", setup }, null, 2));
                  process.exit(1);
                }
              ' "\${apps}" "\${leads}" "\${setup}"
            else
              apps="\$(public_curl "https://\${host}/api/views/job_search.applications/run?limit=100&deploy=\${OXRM_DEPLOY_GIT_SHA}")"
              leads="\$(public_curl "https://\${host}/api/leads?limit=100&deploy=\${OXRM_DEPLOY_GIT_SHA}")"
              node -e '
                const apps = JSON.parse(process.argv[1]);
                const leads = JSON.parse(process.argv[2]);
                const appCount = Array.isArray(apps.rows) ? apps.rows.length : 0;
                const leadCount = Array.isArray(leads) ? leads.length : 0;
                if (leadCount < 1 || appCount !== 0) {
                  console.error(JSON.stringify({ error: "outreach_public_data_mismatch", appCount, leadCount }, null, 2));
                  process.exit(1);
                }
              ' "\${apps}" "\${leads}"
            fi
          }

          check_demo_mode job-search-demo.oxrm.orkestr.de job_search /applications
          check_demo_mode linkedin-outreach-demo.oxrm.orkestr.de outreach /pipeline
          REMOTE
