name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22.22.3"
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Check shell scripts
        run: bash -n oxrm ocrm scripts/oxrm-instance scripts/oxrm-internal scripts/codex-demo.sh scripts/deploy-live-demo scripts/smoke-user-journey.sh scripts/check-workspace-mode-ui.sh

      - name: Launch naming and docs guard
        run: |
          test ! -e crm
          test -x oxrm
          test -x ocrm
          test -x scripts/oxrm-instance
          test -x scripts/oxrm-internal
          test -f docs/migrations/v0.2-to-v0.3.md
          test -f .codex/config.toml
          test -f AGENTS.md
          test -f docs/assets/oxrm-dashboard.png
          test "$(wc -l < README.md)" -le 200
          ! rg -n "otcan/orkestr-crm|@orkestr-crm|scripts/crm|orkestr-crm|orkestr_crm|ORKESTR_HOST|ORKESTR_ADMIN|backups@orkestr" \
            --glob '!node_modules/**' \
            --glob '!apps/web/dist/**' \
            --glob '!dist/**' \
            --glob '!.github/workflows/ci.yml' \
            --glob '!docs/migrations/v0.2-to-v0.3.md' \
            --glob '!ocrm'

      - name: Workspace mode UI guard
        run: bash scripts/check-workspace-mode-ui.sh

      - name: Check built package exports
        run: |
          pnpm --filter @oxrm/api exec node --input-type=module -e "await import('@oxrm/shared'); await import('@oxrm/db'); await import('@oxrm/core');"

      - name: Check migration generation
        run: |
          pnpm db:generate
          git diff --exit-code packages/db/src/migrations

      - name: Validate Compose
        run: docker compose -f docker-compose.yml -f infra/compose/docker-compose.prod.yml config

      - name: Validate public demo Compose
        run: |
          POSTGRES_DB=oxrm_ci \
          POSTGRES_USER=oxrm_ci \
          POSTGRES_PASSWORD=ci-password \
          HOST_API_PORT=18311 \
          HOST_POSTGRES_PORT=18313 \
          docker compose -f infra/compose/docker-compose.public-demo.yml config

  docker-demo:
    needs: static
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22.22.3"
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prepare demo env
        run: cp instances/demo.env.example instances/demo.local.env

      - name: Start and seed Codex demo stack
        run: ./oxrm codex-demo --check

      - name: HTTP smoke
        run: |
          curl -fsS http://127.0.0.1:18291/api/health
          curl -fsS http://127.0.0.1:18291/api/views
          curl -fsSI http://127.0.0.1:18290/

      - name: MCP smoke
        run: |
          ./oxrm cli health
          ./oxrm tools
          ./oxrm cli mcp:read crm://queue/today

      - name: Fresh non-demo user journey smoke
        run: bash scripts/smoke-user-journey.sh

      - name: Stop demo stack
        if: always()
        run: ./oxrm stop || true

  proxy-smoke:
    needs: static
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Caddy config
        run: |
          docker run --rm \
            -v "$PWD/infra/proxy/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2 sh -lc 'HASH="$(caddy hash-password --plaintext ci-password)" && OXRM_HOST=:8080 OXRM_ADMIN_USER=ci OXRM_ADMIN_PASSWORD_HASH="$HASH" caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile'

      - name: Validate demo Caddy config
        run: |
          docker run --rm \
            -v "$PWD/infra/proxy/Caddyfile.demos:/etc/caddy/Caddyfile:ro" \
            caddy:2 sh -lc 'HASH="$(caddy hash-password --plaintext ci-password)" && OXRM_DEMO_ADMIN_USER=ci OXRM_DEMO_ADMIN_PASSWORD_HASH="$HASH" JOB_SEARCH_DEMO_API_PORT=18311 LINKEDIN_OUTREACH_DEMO_API_PORT=18321 caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile'

  deploy-live-demos:
    needs:
      - static
      - docker-demo
      - proxy-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: live-demos

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure SSH
        env:
          OXRM_DEMO_SSH_HOST: ${{ secrets.OXRM_DEMO_SSH_HOST }}
          OXRM_DEMO_SSH_PORT: ${{ secrets.OXRM_DEMO_SSH_PORT }}
          OXRM_DEMO_SSH_PRIVATE_KEY: ${{ secrets.OXRM_DEMO_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$OXRM_DEMO_SSH_PRIVATE_KEY" > ~/.ssh/oxrm-demo
          chmod 600 ~/.ssh/oxrm-demo
          ssh-keyscan -p "${OXRM_DEMO_SSH_PORT:-22}" "$OXRM_DEMO_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Copy checkout to demo host
        env:
          OXRM_DEMO_SSH_HOST: ${{ secrets.OXRM_DEMO_SSH_HOST }}
          OXRM_DEMO_SSH_USER: ${{ secrets.OXRM_DEMO_SSH_USER }}
          OXRM_DEMO_SSH_PORT: ${{ secrets.OXRM_DEMO_SSH_PORT }}
          OXRM_DEMO_DEPLOY_ROOT: ${{ secrets.OXRM_DEMO_DEPLOY_ROOT }}
        run: |
          port="${OXRM_DEMO_SSH_PORT:-22}"
          remote="${OXRM_DEMO_SSH_USER}@${OXRM_DEMO_SSH_HOST}"
          release_dir="${OXRM_DEMO_DEPLOY_ROOT}/releases/${GITHUB_SHA}"
          ssh -i ~/.ssh/oxrm-demo -p "$port" "$remote" "rm -rf '$release_dir' && mkdir -p '$release_dir'"
          tar --exclude=.git --exclude=node_modules --exclude=.pnpm-store -czf - . \
            | ssh -i ~/.ssh/oxrm-demo -p "$port" "$remote" "tar -xzf - -C '$release_dir' && ln -sfn '$release_dir' '${OXRM_DEMO_DEPLOY_ROOT}/current'"

      - name: Deploy live demos
        env:
          OXRM_DEMO_SSH_HOST: ${{ secrets.OXRM_DEMO_SSH_HOST }}
          OXRM_DEMO_SSH_USER: ${{ secrets.OXRM_DEMO_SSH_USER }}
          OXRM_DEMO_SSH_PORT: ${{ secrets.OXRM_DEMO_SSH_PORT }}
          OXRM_DEMO_DEPLOY_ROOT: ${{ secrets.OXRM_DEMO_DEPLOY_ROOT }}
          OXRM_DEMO_POSTGRES_PASSWORD: ${{ secrets.OXRM_DEMO_POSTGRES_PASSWORD }}
          OXRM_DEMO_ADMIN_USER: ${{ secrets.OXRM_DEMO_ADMIN_USER }}
          OXRM_DEMO_ADMIN_PASSWORD_HASH: ${{ secrets.OXRM_DEMO_ADMIN_PASSWORD_HASH }}
        run: |
          port="${OXRM_DEMO_SSH_PORT:-22}"
          remote="${OXRM_DEMO_SSH_USER}@${OXRM_DEMO_SSH_HOST}"
          deployed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ssh -i ~/.ssh/oxrm-demo -p "$port" "$remote" "bash -se" <<REMOTE
          set -euo pipefail
          cd '${OXRM_DEMO_DEPLOY_ROOT}/current'
          corepack enable
          pnpm install --frozen-lockfile
          export OXRM_DEMO_POSTGRES_PASSWORD='${OXRM_DEMO_POSTGRES_PASSWORD}'
          export OXRM_DEPLOY_VERSION='${GITHUB_RUN_NUMBER}.${GITHUB_SHA}'
          export OXRM_DEPLOY_GIT_SHA='${GITHUB_SHA}'
          export OXRM_DEPLOY_GIT_REF='${GITHUB_REF_NAME}'
          export OXRM_DEPLOY_GITHUB_RUN_ID='${GITHUB_RUN_ID}'
          export OXRM_DEPLOY_GITHUB_RUN_NUMBER='${GITHUB_RUN_NUMBER}'
          export OXRM_DEPLOYED_AT='${deployed_at}'
          scripts/deploy-live-demo job-search-demo job-search-demo.oxrm.orkestr.de job_search 18510 18511 18512 18513 18514 </dev/null
          scripts/deploy-live-demo linkedin-outreach-demo linkedin-outreach-demo.oxrm.orkestr.de outreach 18520 18521 18522 18523 18524 </dev/null
          node <<'NODE'
          const fs = require("node:fs");

          const expectedVersion = process.env.OXRM_DEPLOY_VERSION;
          const manifests = [
            [".deployments/job-search-demo.json", "job-search-demo", "job-search"],
            [".deployments/linkedin-outreach-demo.json", "linkedin-outreach-demo", "linkedin-outreach"]
          ];

          const failures = [];
          for (const [path, instance, scenario] of manifests) {
            if (!fs.existsSync(path)) {
              failures.push({ path, error: "missing_manifest" });
              continue;
            }
            const manifest = JSON.parse(fs.readFileSync(path, "utf8"));
            if (manifest.instance !== instance) failures.push({ path, error: "instance_mismatch", actual: manifest.instance });
            if (manifest.demoScenario !== scenario) failures.push({ path, error: "scenario_mismatch", actual: manifest.demoScenario });
            if (manifest.deployVersion !== expectedVersion) failures.push({ path, error: "version_mismatch", actual: manifest.deployVersion, expected: expectedVersion });
          }

          if (failures.length > 0) {
            console.error(JSON.stringify({ error: "live_demo_manifest_check_failed", failures }, null, 2));
            process.exit(1);
          }
          NODE
          OXRM_DEMO_ADMIN_USER='unused' \
          OXRM_DEMO_ADMIN_PASSWORD_HASH='unused' \
          JOB_SEARCH_DEMO_API_PORT=18511 \
          LINKEDIN_OUTREACH_DEMO_API_PORT=18521 \
            docker compose -p oxrm-demo-proxy -f infra/compose/docker-compose.demo-proxy.yml down --remove-orphans || true

          web_root='${OXRM_DEMO_DEPLOY_ROOT}/current/apps/web/dist/web/browser'
          if [ ! -f "\${web_root}/index.html" ]; then
            echo "Missing built web index at \${web_root}/index.html" >&2
            exit 1
          fi

          if [ -e /srv/oxrm-web ] && [ ! -L /srv/oxrm-web ]; then
            mv /srv/oxrm-web "/srv/oxrm-web.previous.\$(date -u +%Y%m%dT%H%M%SZ)"
          fi
          ln -sfn "\${web_root}" /srv/oxrm-web

          if command -v caddy >/dev/null 2>&1 && [ -f /etc/caddy/Caddyfile ]; then
            caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
          fi
          if command -v systemctl >/dev/null 2>&1 && systemctl is-active --quiet caddy; then
            systemctl reload caddy
          fi

          expected_main="\$(sed -n 's/.*src=\"\\(main-[^\"]*\\.js\\)\".*/\\1/p' "\${web_root}/index.html" | head -n 1)"
          if [ -z "\${expected_main}" ]; then
            echo "Could not read built main asset from \${web_root}/index.html" >&2
            exit 1
          fi

          for host in job-search-demo.oxrm.orkestr.de linkedin-outreach-demo.oxrm.orkestr.de; do
            for attempt in \$(seq 1 10); do
              if curl -fsS -H 'Cache-Control: no-cache' "https://\${host}/today?deploy=\${OXRM_DEPLOY_GIT_SHA}" | grep -F "\${expected_main}" >/dev/null; then
                break
              fi
              if [ "\${attempt}" = "10" ]; then
                echo "Public web bundle for \${host} did not match \${expected_main}" >&2
                exit 1
              fi
              sleep 2
            done
          done

          browser="\$(command -v google-chrome || command -v chromium || command -v chromium-browser || true)"
          if [ -z "\${browser}" ]; then
            echo "A headless browser is required for rendered demo mode checks." >&2
            exit 1
          fi

          check_demo_mode() {
            host="\$1"
            expected_mode="\$2"
            expected_label="\$3"
            forbidden_label="\$4"
            page_path="\$5"
            welcome_label="\$6"

            bootstrap="\$(curl -fsS -H 'Cache-Control: no-cache' "https://\${host}/api/workspace/bootstrap?deploy=\${OXRM_DEPLOY_GIT_SHA}")"
            node -e '
              const data = JSON.parse(process.argv[1]);
              const expected = process.argv[2];
              if (data.mode !== expected || data.templateKey !== expected) {
                console.error(JSON.stringify({ error: "workspace_mode_mismatch", data, expected }, null, 2));
                process.exit(1);
              }
              if (!data.demo?.enabled || data.demo.guideVersion !== 1 || !data.demo.readOnly || !data.demo.resettable) {
                console.error(JSON.stringify({ error: "demo_config_mismatch", data }, null, 2));
                process.exit(1);
              }
            ' "\${bootstrap}" "\${expected_mode}"

            dom_file="\$(mktemp)"
            "\${browser}" --headless=new --disable-gpu --no-sandbox --ignore-certificate-errors --virtual-time-budget=8000 --dump-dom "https://\${host}\${page_path}?deploy=\${OXRM_DEPLOY_GIT_SHA}" > "\${dom_file}"
            grep -F "data-oxrm-mode=\"\${expected_mode}\"" "\${dom_file}" >/dev/null
            grep -F "oxrm-workspace-mode" "\${dom_file}" >/dev/null
            grep -F "\${expected_label}" "\${dom_file}" >/dev/null
            if grep -F "\${forbidden_label}" "\${dom_file}" >/dev/null; then
              echo "Rendered \${host} contains forbidden cross-mode label: \${forbidden_label}" >&2
              exit 1
            fi

            welcome_dom="\$(mktemp)"
            profile_dir="\$(mktemp -d)"
            "\${browser}" --headless=new --disable-gpu --no-sandbox --ignore-certificate-errors --user-data-dir="\${profile_dir}" --virtual-time-budget=8000 --dump-dom "https://\${host}/today?deploy=\${OXRM_DEPLOY_GIT_SHA}" > "\${welcome_dom}"
            grep -F "\${welcome_label}" "\${welcome_dom}" >/dev/null
          }

          check_demo_mode job-search-demo.oxrm.orkestr.de job_search Applications Pipeline /applications "private AI job-search copilot"
          check_demo_mode linkedin-outreach-demo.oxrm.orkestr.de outreach Pipeline Applications /pipeline "private AI outreach copilot"
          REMOTE
